<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RoviTour - Turismo y Experiencias</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="/css/estilosnavegacion.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="img/logo.png" alt="Logo RoviTour">
        </div>

        <div class="titulo">
            <h1>RoviTour</h1>
            <p>Descubre experiencias turísticas únicas</p>
        </div>
    </header>

    <!-- Navegación -->
    <nav class="navbar">
        <ul class="menu">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#servicios">Servicios</a></li>
            <li><a href="#destinos">Destinos</a></li>
            <li><a href="#municipios">Municipios</a></li>
            <li><a href="#gastronomia">Gastronomía</a></li>
            <li><a href="#eventos">Eventos</a></li>
            <li><a href="#hospedajes">Hospedajes</a></li>
            <li><a href="#restaurantes">Restaurantes</a></li>
            <li><a href="#transporte">Transporte</a></li>
            <li><a href="#galeria">Galería</a></li>
            <li><a href="#contacto">Contacto</a></li>
            <li><a href="#acerca">Acerca de</a></li>
        </ul>
    </nav>

    <!-- Destinos -->
    <section id="destinos">
        <h2>Destinos</h2>

        <div class="galeria">

            <figure>
                <img src="img/balcon.png" alt="Balcón turístico">
                <figcaption>Balcón Turístico (Macaravita)</figcaption>
            </figure>

            <figure>
                <img src="img/Cañon_Chicamocha.jpg" alt="Cañón Chicamocha">
                <figcaption>Cañón del Chicamocha (Capitanejo)</figcaption>
            </figure>

            <figure>
                <img src="img/chorrera.png" alt="La Chorrera">
                <figcaption>La Chorrera (Capitanejo)</figcaption>
            </figure>

            <figure>
                <img src="img/laguna.jpg" alt="Laguna">
                <figcaption>Laguna de Ortices (Molagavita)</figcaption>
            </figure>

            <figure>
                <img src="img/miranda.jpg" alt="Miranda">
                <figcaption>Parque de Miranda</figcaption>
            </figure>

            <figure>
                <img src="img/Paramo.jpg" alt="Páramo">
                <figcaption>Páramo de Amorzadero (Cerrito)</figcaption>
            </figure>

            <figure>
                <img src="img/peñaCabro.jpg" alt="Peña del Cabro">
                <figcaption>Peña del Cabro (Málaga)</figcaption>
            </figure>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 RoviTour - Turismo y Experiencias</p>
    </footer>

</body>
</html>
